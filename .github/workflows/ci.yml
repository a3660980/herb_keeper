name: CI

on:
  push:
    branches:
      - master
      - staging
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    environment: E2E
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required E2E secrets
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing secret: NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY" || (echo "Missing secret: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          test -n "$E2E_USER_EMAIL" || (echo "Missing secret: E2E_USER_EMAIL" && exit 1)
          test -n "$E2E_USER_PASSWORD" || (echo "Missing secret: E2E_USER_PASSWORD" && exit 1)

      - name: Validate Supabase secret formats
        run: |
          node --input-type=module <<'EOF'
          const urlValue = process.env.NEXT_PUBLIC_SUPABASE_URL?.trim() ?? ""
          const publicKey = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY?.trim() ?? ""
          const serviceRoleKey = process.env.SUPABASE_SERVICE_ROLE_KEY?.trim() ?? ""

          if (!urlValue) {
            throw new Error("NEXT_PUBLIC_SUPABASE_URL is empty after trimming.")
          }

          let parsedUrl

          try {
            parsedUrl = new URL(urlValue)
          } catch {
            throw new Error("NEXT_PUBLIC_SUPABASE_URL must be a valid HTTP or HTTPS URL. Check whether the URL secret was pasted into the wrong field.")
          }

          if (!["http:", "https:"].includes(parsedUrl.protocol)) {
            throw new Error("NEXT_PUBLIC_SUPABASE_URL must use http or https.")
          }

          if (!publicKey) {
            throw new Error("NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY is empty after trimming.")
          }

          if (publicKey.startsWith("http://") || publicKey.startsWith("https://")) {
            throw new Error("NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY looks like a URL. Check whether the URL and publishable key secrets are swapped.")
          }

          if (!serviceRoleKey) {
            throw new Error("SUPABASE_SERVICE_ROLE_KEY is empty after trimming.")
          }

          if (serviceRoleKey.startsWith("http://") || serviceRoleKey.startsWith("https://")) {
            throw new Error("SUPABASE_SERVICE_ROLE_KEY looks like a URL. Check whether the service role key secret is set correctly.")
          }

          console.log(`Validated Supabase host: ${parsedUrl.host}`)
          EOF

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore